<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPS 360 - Student Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:380px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0px 10px 25px rgba(0,0,0,.3);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        #message{
            margin-top:15px;
            text-align:center;
            color:red;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Student Login</h2>

    <input
        type="email"
        id="email"
        placeholder="Email">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <p id="message"></p>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


const firebaseConfig = {

  apiKey: "Ask_me",

  authDomain: "ips-360.firebaseapp.com",

  projectId: "ips-360",

  storageBucket: "ips-360.firebasestorage.app",

  messagingSenderId: "426738007078",

  appId: "1:426738007078:web:1de8c32678ef5f43597ae7"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


window.login = async function(){

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    try{

        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        window.location.href="/login/student/dashboard";

    }

    catch(error){

        document.getElementById("message").innerHTML =
            error.message;

    }

}

</script>

</body>
</html>
